name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
      - name: Install validator dependencies
        run: python -m pip install -r conformance/validator/requirements.txt
      - name: Validate schema registry
        run: python conformance/validator/check_schema_registry.py
      - name: Validate semantic convention schema map
        run: python conformance/validator/check_semconv_schema_map.py
      - name: Validate bundled receipts
        run: |
          python conformance/validator/check_conformance.py
          python conformance/validator/validate_receipt.py examples/*/receipt.json
